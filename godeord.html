<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>godeord</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Caveat:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ---------- base ---------- */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }

  :root {
    --base:         #0a1929;   /* deep sea night */
    --abyss:        #061320;   /* deepest water */
    --deep:         #14304a;   /* mid sea */
    --tide:         #1f4865;   /* tide blue */
    --current:      #2d6788;   /* lighter current */
    --foam:         #6fa8c4;   /* pale foam highlight */
    --moonlight:    #a8c8dc;   /* moonlight on water */
    --ink:          #d8e4ed;   /* pale ink (text on dark) */
    --ink-soft:     #8aa5b8;   /* faded sea-mist text */
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--base);
    color: var(--ink);
    font-family: 'Cormorant Garamond', 'EB Garamond', Georgia, serif;
    overflow: hidden;
    position: relative;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ---------- watercolour background ----------
     Layered radial gradients create soft pigment blooms.
     SVG turbulence overlay adds paper-bleed grain. */
  .wash {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 70% 55% at 20% 20%, rgba(45, 103, 136, 0.55), transparent 65%),
      radial-gradient(ellipse 60% 50% at 80% 25%, rgba(31, 72, 101, 0.65), transparent 65%),
      radial-gradient(ellipse 75% 60% at 75% 80%, rgba(20, 48, 74, 0.70), transparent 60%),
      radial-gradient(ellipse 55% 45% at 15% 85%, rgba(45, 103, 136, 0.40), transparent 65%),
      radial-gradient(ellipse 45% 40% at 50% 50%, rgba(111, 168, 196, 0.18), transparent 70%),
      radial-gradient(ellipse 80% 70% at 50% 100%, rgba(6, 19, 32, 0.85), transparent 60%),
      var(--base);
    filter: blur(0.5px);
  }

  /* paper grain via SVG noise */
  .grain {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.07;
  }

  /* drifting petal particles */
  .petals {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
  }
  .petal {
    position: absolute;
    bottom: -8vh;
    width: 14px;
    height: 14px;
    border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
    opacity: 0;
    animation: drift linear infinite;
    will-change: transform, opacity;
    filter: blur(0.5px);
  }
  .petal:nth-child(1)  { left:  8%; background: rgba(168, 200, 220, 0.45); animation-duration: 28s; animation-delay:  0s; }
  .petal:nth-child(2)  { left: 22%; background: rgba(111, 168, 196, 0.40); animation-duration: 36s; animation-delay: -6s; transform: scale(0.7); }
  .petal:nth-child(3)  { left: 35%; background: rgba(168, 200, 220, 0.35); animation-duration: 42s; animation-delay: -14s; transform: scale(1.1); }
  .petal:nth-child(4)  { left: 48%; background: rgba(111, 168, 196, 0.40); animation-duration: 32s; animation-delay: -3s; transform: scale(0.85); }
  .petal:nth-child(5)  { left: 60%; background: rgba(168, 200, 220, 0.50); animation-duration: 38s; animation-delay: -20s; transform: scale(0.6); }
  .petal:nth-child(6)  { left: 72%; background: rgba(111, 168, 196, 0.35); animation-duration: 30s; animation-delay: -9s; }
  .petal:nth-child(7)  { left: 85%; background: rgba(168, 200, 220, 0.40); animation-duration: 44s; animation-delay: -18s; transform: scale(1.2); }
  .petal:nth-child(8)  { left: 92%; background: rgba(111, 168, 196, 0.30); animation-duration: 34s; animation-delay: -25s; transform: scale(0.75); }
  .petal:nth-child(9)  { left: 15%; background: rgba(168, 200, 220, 0.40); animation-duration: 40s; animation-delay: -11s; transform: scale(0.9); }
  .petal:nth-child(10) { left: 65%; background: rgba(111, 168, 196, 0.45); animation-duration: 26s; animation-delay: -16s; transform: scale(0.7); }

  @keyframes drift {
    0%   { transform: translateY(0)        translateX(0)     rotate(0deg)   scale(var(--s, 1)); opacity: 0; }
    10%  { opacity: 0.7; }
    50%  { transform: translateY(-50vh)    translateX(20px)  rotate(180deg) scale(var(--s, 1)); }
    90%  { opacity: 0.4; }
    100% { transform: translateY(-110vh)   translateX(-15px) rotate(360deg) scale(var(--s, 1)); opacity: 0; }
  }

  /* ---------- layout ---------- */
  .stage {
    position: relative;
    z-index: 3;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6vh 8vw;
  }

  .message-wrap {
    max-width: 720px;
    text-align: center;
    opacity: 0;
    transform: translateY(12px);
    animation: rise 1.6s cubic-bezier(0.22, 0.61, 0.36, 1) 0.2s forwards;
  }

  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }

  /* decorative ornament above message */
  .ornament {
    display: block;
    margin: 0 auto 2.2rem;
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--foam), transparent);
    opacity: 0;
    animation: fadein 2s ease 0.4s forwards;
  }
  .ornament::before {
    content: "✦";
    position: relative;
    top: -10px;
    background: transparent;
    color: var(--foam);
    font-size: 14px;
    opacity: 0.65;
  }

  @keyframes fadein { to { opacity: 1; } }

  #message {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(1.6rem, 4.2vw, 2.6rem);
    line-height: 1.45;
    color: var(--ink);
    letter-spacing: 0.005em;
    margin: 0;
    text-wrap: balance;
  }

  .signature {
    margin-top: 2.5rem;
    font-family: 'Caveat', cursive;
    font-size: clamp(1rem, 1.6vw, 1.15rem);
    color: var(--ink-soft);
    opacity: 0;
    animation: fadein 2s ease 1.1s forwards;
    letter-spacing: 0.02em;
  }

  .date-stamp {
    position: fixed;
    top: 2rem;
    left: 2rem;
    z-index: 4;
    font-family: 'Caveat', cursive;
    font-size: 1.05rem;
    color: var(--ink-soft);
    opacity: 0;
    animation: fadein 2.5s ease 1.5s forwards;
    letter-spacing: 0.03em;
  }

  .day-marker {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 4;
    font-family: 'Caveat', cursive;
    font-size: 0.95rem;
    color: var(--ink-soft);
    opacity: 0;
    animation: fadein 2.5s ease 1.5s forwards;
    letter-spacing: 0.03em;
  }

  @media (max-width: 600px) {
    .date-stamp { top: 1.2rem; left: 1.2rem; font-size: 0.95rem; }
    .day-marker { bottom: 1.2rem; right: 1.2rem; font-size: 0.9rem; }
    .stage { padding: 4vh 6vw; }
    #message { font-style: italic; }
  }

  @media (prefers-reduced-motion: reduce) {
    .petals { display: none; }
    .message-wrap, .ornament, .signature, .date-stamp, .day-marker {
      animation: fadein 0.6s ease forwards;
      opacity: 1;
      transform: none;
    }
  }
</style>
</head>
<body>

<!-- watercolour wash layer -->
<div class="wash"></div>

<!-- SVG paper-grain overlay -->
<svg class="grain" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.55
                             0 0 0 0 0.68
                             0 0 0 0 0.80
                             0 0 0 0.22 0"/>
    </filter>
    <filter id="bloom">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="20"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" filter="url(#paper)"/>
</svg>

<!-- drifting petals -->
<div class="petals" aria-hidden="true">
  <span class="petal"></span><span class="petal"></span><span class="petal"></span>
  <span class="petal"></span><span class="petal"></span><span class="petal"></span>
  <span class="petal"></span><span class="petal"></span><span class="petal"></span>
  <span class="petal"></span>
</div>

<!-- date corner -->
<div class="date-stamp" id="dateStamp"></div>
<div class="day-marker" id="dayMarker"></div>

<!-- the message -->
<main class="stage">
  <div class="message-wrap">
    <span class="ornament" aria-hidden="true"></span>
    <p id="message">…</p>
    <div class="signature">— for deg, alltid</div>
  </div>
</main>

  /*364 */ "Jeg elsker at vi får et år til med små morgener, kjelen, hunden, ansiktet ditt, lyset.",  // romantisk
  /*365 */ "Av alle årene jeg har levd, er de med deg i dem de jeg ville gjort om igjen, akkurat slik.",  // romantisk
];

/* =====================================================================
   DAY-OF-YEAR LOGIC
   ===================================================================== */

function getDayOfYear(date) {
  const start = new Date(date.getFullYear(), 0, 0);
  const diff = date - start
    + (start.getTimezoneOffset() - date.getTimezoneOffset()) * 60 * 1000;
  const oneDay = 1000 * 60 * 60 * 24;
  return Math.floor(diff / oneDay);
}

function formatDate(date) {
  return date.toLocaleDateString('nb-NO', {
    weekday: 'long',
    day: 'numeric',
    month: 'long'
  });
}

function render() {
  const now = new Date();
  const doy = getDayOfYear(now);                  // 1–366
  const idx = ((doy - 1) % messages.length + messages.length) % messages.length;

  const msgEl = document.getElementById('message');
  msgEl.textContent = messages[idx];

  document.getElementById('dateStamp').textContent = formatDate(now);
  document.getElementById('dayMarker').textContent = `nr. ${idx + 1}`;
}

function scheduleMidnightRefresh() {
  const now = new Date();
  const tomorrow = new Date(
    now.getFullYear(),
    now.getMonth(),
    now.getDate() + 1,
    0, 0, 5      // 5 seconds past midnight to avoid edge cases
  );
  const msUntilMidnight = tomorrow - now;
  setTimeout(() => {
    // gentle cross-fade on refresh
    const wrap = document.querySelector('.message-wrap');
    wrap.style.transition = 'opacity 1s ease';
    wrap.style.opacity = '0';
    setTimeout(() => {
      render();
      wrap.style.opacity = '1';
      scheduleMidnightRefresh();
    }, 1000);
  }, msUntilMidnight);
}

render();
scheduleMidnightRefresh();
</script>
