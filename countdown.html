<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nedtelling</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        :root {
            --base:       #1A3328;
            --mid:        #2C4A3E;
            --cream:      #F5F2EB;
            --cream-soft: #9dbdb2;
            --gold:       #8B6914;
            --gold-light: #C4A35A;
            --sage:       #7A9E8E;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(ellipse 80% 60% at 30% 40%, rgba(44, 74, 62, 0.55), transparent 70%),
                var(--base);
            font-family: 'Lato', sans-serif;
            font-weight: 300;
            color: var(--cream);
            padding: 3rem 2rem;
        }

        .container {
            text-align: center;
            max-width: 860px;
            width: 100%;
        }

        /* ── Headline ── */
        .headline {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-style: italic;
            font-size: clamp(1.6rem, 4vw, 2.8rem);
            color: var(--cream);
            line-height: 1.35;
            letter-spacing: 0.01em;
            margin-bottom: 2.8rem;
        }

        /* ── Divider ── */
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            margin-bottom: 3.5rem;
        }

        .divider-line {
            height: 1px;
            flex: 1;
            max-width: 200px;
            background: linear-gradient(to right, transparent, var(--gold), transparent);
        }

        .divider-gem {
            width: 6px;
            height: 6px;
            background: var(--gold);
            transform: rotate(45deg);
            flex-shrink: 0;
        }

        /* ── Countdown ── */
        .countdown {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: clamp(0.6rem, 3vw, 2.5rem);
            flex-wrap: wrap;
            margin-bottom: 4rem;
        }

        .unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 70px;
        }

        .number {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(3rem, 9vw, 5.5rem);
            color: var(--cream);
            line-height: 1;
            margin-bottom: 0.6rem;
            letter-spacing: 0.02em;
        }

        .label {
            font-family: 'Lato', sans-serif;
            font-weight: 300;
            font-size: clamp(0.75rem, 2.5vw, 0.85rem);
            letter-spacing: 0.32em;
            text-transform: uppercase;
            color: var(--cream-soft);
        }

        .sep {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 300;
            color: var(--gold);
            line-height: 1;
            padding-top: 0.05em;
            opacity: 0.45;
            align-self: flex-start;
            user-select: none;
        }

        /* ── Reveal ── */
        .reveal {
            opacity: 0;
            pointer-events: none;
            display: none;
        }

        .reveal.show {
            display: block;
            animation: revealFade 2.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            pointer-events: auto;
        }

        @keyframes revealFade {
            0%   { opacity: 0; transform: translateY(28px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .gift-link {
            display: inline-block;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-style: italic;
            font-size: clamp(1rem, 2vw, 1.2rem);
            line-height: 1.7;
            color: var(--cream);
            text-decoration: none;
            border: 1px solid rgba(139, 105, 20, 0.5);
            padding: 1.2rem 2rem;
            max-width: 600px;
            letter-spacing: 0.01em;
            transition: border-color 0.3s ease, color 0.3s ease;
        }

        .gift-link:hover {
            border-color: var(--gold);
            color: var(--gold-light);
        }

        /* ── Mobile ── */
        @media (max-width: 520px) {
            .sep { display: none; }
            .countdown { gap: 1rem; }
            .unit { min-width: 58px; }
            .gift-link {
                display: block;
                width: 100%;
                padding: 1.2rem 1.2rem;
                font-size: clamp(0.95rem, 4vw, 1.1rem);
            }
            body { padding: 1.5rem 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="container">

        <h1 class="headline">Nedtelling til bursdagen din</h1>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-gem"></div>
            <div class="divider-line"></div>
        </div>

        <div class="countdown" id="countdown">
            <div class="unit">
                <div class="number" id="days">00</div>
                <div class="label">dager</div>
            </div>
            <div class="sep">:</div>
            <div class="unit">
                <div class="number" id="hours">00</div>
                <div class="label">timer</div>
            </div>
            <div class="sep">:</div>
            <div class="unit">
                <div class="number" id="minutes">00</div>
                <div class="label">minutter</div>
            </div>
            <div class="sep">:</div>
            <div class="unit">
                <div class="number" id="seconds">00</div>
                <div class="label">sekunder</div>
            </div>
        </div>

        <div class="reveal" id="reveal">
            <a class="gift-link" href="https://williamboland1.github.io/AnnaSpill/">
                Gratulerer med dagen min jenta mi, jeg elsker deg utrolig høyt!<br>Trykk her for å bli tatt videre til del 1 av bursdagsgaven din ❤️
            </a>
        </div>

    </div>

    <script>
        const TARGET = new Date('2026-06-27T00:00:00');

        function pad(n) {
            return String(n).padStart(2, '0');
        }

        function tick() {
            const diff = TARGET - Date.now();

            if (diff <= 0) {
                document.getElementById('countdown').style.display = 'none';
                document.getElementById('reveal').classList.add('show');
                return;
            }

            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            document.getElementById('days').textContent    = pad(d);
            document.getElementById('hours').textContent   = pad(h);
            document.getElementById('minutes').textContent = pad(m);
            document.getElementById('seconds').textContent = pad(s);
        }

        tick();
        setInterval(tick, 1000);
    </script>
</body>
</html>
